name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: opencode-manager-windows-x86_64
            runner: windows-latest
            os: windows
          - artifact: opencode-manager-linux-x86_64
            runner: ubuntu-latest
            os: linux
          - artifact: opencode-manager-linux-aarch64
            runner: ubuntu-24.04-arm
            os: linux
          - artifact: opencode-manager-macos-x86_64
            runner: macos-13
            os: macos
          - artifact: opencode-manager-macos-aarch64
            runner: macos-14
            os: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lazarus on Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install lazarus sqlite openssl.light -y --no-progress
          "C:\lazarus" | Out-File -FilePath $env:GITHUB_PATH -Append
          $fpcBin = Get-ChildItem -LiteralPath "C:\lazarus\fpc" -Directory -Recurse |
            Where-Object { Test-Path -LiteralPath (Join-Path $_.FullName "fpc.exe") } |
            Select-Object -First 1
          if (-not $fpcBin) { throw "Unable to find fpc.exe under C:\lazarus\fpc" }
          $fpcBin.FullName | Out-File -FilePath $env:GITHUB_PATH -Append
          $dllDirs = Get-ChildItem -LiteralPath $env:ChocolateyInstall -Recurse -File -Include sqlite3.dll,libssl*.dll,libcrypto*.dll -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty DirectoryName -Unique
          foreach ($dllDir in $dllDirs) { $dllDir | Out-File -FilePath $env:GITHUB_PATH -Append }

      - name: Install Lazarus on Linux
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lazarus fpc zip libgtk2.0-dev

      - name: Install Lazarus on macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            sudo softwareupdate --install-rosetta --agree-to-license || true
          fi
          brew update
          brew install fpc lazarus
          if [ -x /Applications/Lazarus/lazbuild ]; then
            echo "LAZBUILD=/Applications/Lazarus/lazbuild" >> "$GITHUB_ENV"
          elif [ -x /Applications/Lazarus.app/Contents/MacOS/lazbuild ]; then
            echo "LAZBUILD=/Applications/Lazarus.app/Contents/MacOS/lazbuild" >> "$GITHUB_ENV"
          else
            find /Applications -name lazbuild -type f -maxdepth 4 -print
            exit 1
          fi
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        shell: pwsh
        run: |
          $lazbuild = if ($env:LAZBUILD) { $env:LAZBUILD } else { "lazbuild" }
          & $lazbuild --version
          fpc -iV

      - name: Test
        shell: pwsh
        run: ./scripts/ci-test.ps1

      - name: Build application
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Package
        id: package
        shell: pwsh
        run: ./scripts/ci-package.ps1 -ArtifactName "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
